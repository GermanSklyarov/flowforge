services:
  api:
    image: node:24-alpine
    working_dir: /app
    command: sh -c "npm install && npm run db:migrate && npm run dev:api"
    environment:
      NODE_ENV: development
      API_HOST: 0.0.0.0
      API_PORT: 4000
      DATABASE_URL: postgres://flowforge:flowforge@postgres:5432/flowforge
      REDIS_URL: redis://redis:6379
    ports:
      - "4000:4000"
    volumes:
      - .:/app
      - api-node-modules:/app/node_modules
    depends_on:
      - postgres
      - redis

  worker:
    image: node:24-alpine
    working_dir: /app
    command: sh -c "npm install && npm run db:migrate && npm run dev:worker"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://flowforge:flowforge@postgres:5432/flowforge
      REDIS_URL: redis://redis:6379
    volumes:
      - .:/app
      - worker-node-modules:/app/node_modules
    depends_on:
      - postgres
      - redis

  web:
    image: node:24-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev:web"
    environment:
      WEB_HOST: 0.0.0.0
      WEB_PORT: 5173
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - web-node-modules:/app/node_modules
    depends_on:
      - api

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: flowforge
      POSTGRES_USER: flowforge
      POSTGRES_PASSWORD: flowforge
    ports:
      - "55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "56379:6379"

volumes:
  postgres-data:
  api-node-modules:
  worker-node-modules:
  web-node-modules:
